  <path stroke="url(#gold)" stroke-width="1.1" stroke-linecap="round" d="M8.5 16.5h15"/>
  <!-- arms -->
  <rect x="6" y="14" width="2.75" height="6.5" rx="1" fill="#faf8f5"/>
  <rect x="23.25" y="14" width="2.75" height="6.5" rx="1" fill="#faf8f5"/>
  <!-- legs -->
  <rect x="9" y="20.5" width="1.5" height="2" rx="0.4" fill="url(#gold)"/>
  <rect x="21.5" y="20.5" width="1.5" height="2" rx="0.4" fill="url(#gold)"/>
