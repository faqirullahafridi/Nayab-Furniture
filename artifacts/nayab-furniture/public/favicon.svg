      <stop stop-color="#e8cc7a"/>
      <stop offset="1" stop-color="#a67c2e"/>
    </linearGradient>
  </defs>
  <!-- walnut background -->
  <rect width="32" height="32" rx="7" fill="#1f1812"/>
